description: FOCUS-aligned FinOps shape for Telephone and Data Systems. TDS bills connectivity
  services (broadband, voice, video, business connectivity, wireless infrastructure) on a recurring
  subscription basis rather than as developer-API consumption.
sources:
  - https://www.tdstelecom.com/
notes: TDS does not operate a usage-priced developer API. FOCUS columns capture the publisher
  identity; meters describe connectivity-service subscriptions rather than API requests.
