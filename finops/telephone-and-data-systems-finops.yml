meters:
  - name: connectivity_subscriptions
    unit: month
    aggregation: sum
    dimensions:
      - product
      - market
principles:
  - name: Visibility
    description: Spend is observed through TDS Telecom invoices and account portals; no developer
      consumption export exists.
  - name: Allocation
    description: Allocation is by service line (residential broadband, business broadband, voice,
      wireless infrastructure) and market.
  - name: Optimization
    description: Optimization is procurement / contract-driven (term length, bundle selection)
      rather than API-cost driven.
  - name: Accountability
    description: The contracting customer (residential household or business owner) is the
      accountable cost owner of the connectivity subscription.
