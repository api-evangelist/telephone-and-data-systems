description: TDS does not operate a public developer-API surface, so no rate-limit specification
  applies. The TDS Telecom and Array Digital Infrastructure properties expose service-level
  agreements at the connectivity layer rather than per-API request quotas.
sources:
  - https://www.tdstelecom.com/
notes: No public developer-API rate-limit documentation could be located. Connectivity-layer SLAs
  for broadband and wireless service exist at the network level rather than as request-throttling
  policy.
limits:
  - name: No Public Developer API
    scope: account
    metric: varies
    limit: not applicable
    notes: TDS does not expose a developer API with published rate limits. Service-level agreements
      operate at the connectivity layer.
policies:
  - name: Connectivity-Layer SLAs Only
    description: SLAs apply to broadband and wireless service quality, not to API request rates.
