description: Telephone and Data Systems (TDS) sells consumer and business broadband, video, and
  voice services through TDS Telecom and operates wireless infrastructure through Array Digital
  Infrastructure. TDS does not operate a public developer-API product with a published price card;
  service plans are residential / business connectivity packages, not API consumption tiers.
sources:
  - https://www.tdstelecom.com/
notes: TDS does not publish a developer-API plan ladder. The original Free / Pro / Enterprise
  scaffold was a synthetic API tier model that does not match how TDS commercializes its services.
  Replaced with a Contact Sales placeholder until a real developer surface is identified.
plans:
  - id: telephone-and-data-systems-contact-sales
    name: Contact Sales
    type: enterprise
    description: TDS commercial relationships (broadband, business connectivity, wholesale,
      wireless infrastructure) are negotiated directly. There is no developer-API price list.
    entries:
      - label: Negotiated Service Agreement
        name: contact_sales
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: TDS Telecom Connectivity
      - name: Array Digital Infrastructure (Wireless)
      - name: Custom Commercial Terms
