    name: TDS Telecom
    description: >-
      TDS Telecom provides high-speed broadband, video, and voice services to residential
      and business customers across more than 900 rural and suburban communities in 30 states.
      TDS Telecom delivers fiber-to-the-home (FTTH) internet, digital TV, and phone services,
      focusing on underserved markets.
