aid: telephone-and-data-systems
name: Telephone and Data Systems
description: >-
  Telephone and Data Systems (TDS) is a diversified telecommunications holding company
  providing broadband, video, and voice services across the United States through its
  subsidiary TDS Telecom, and wireless infrastructure through Array Digital Infrastructure
  (formerly U.S. Cellular). TDS serves customers in rural and suburban communities across
  30 states, delivering fiber-based broadband and advanced connectivity solutions.
